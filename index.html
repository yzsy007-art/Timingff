<!DOCTYPE html>
<html>
<head>
  <title>타이밍</title>

  <!-- 🔥 모바일 핵심 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔥 스플래시 -->
<div id="splash">
  <h1 id="quote"></h1>
</div>

<!-- 🔥 엔딩 -->
<div id="ending">
  <h1>후회없는 하루였기를</h1>
</div>

<!-- 🔥 메인 -->
<div class="app" id="main">

  <div class="header">
    <button onclick="changeDay(-1)">←</button>

    <div class="title-box">
      <h1 id="dateTitle">오늘</h1>

      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="percentText">0%</div>
    </div>

    <button onclick="changeDay(1)">→</button>
  </div>

  <!-- du -->
  <div class="section">
    <h2>du</h2>
    <div id="duList"></div>

    <div class="input-box">
      <input id="duInput" placeholder="할 일">
      <button class="add-btn" onclick="addTask('du')">+</button>
    </div>
  </div>

  <!-- allways -->
  <div class="section allways">
    <h2>allways</h2>
    <div id="allwaysList"></div>

    <div class="input-box">
      <input id="allwaysInput" placeholder="항상 할 일">
      <button class="add-btn" onclick="addTask('allways')">+</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
